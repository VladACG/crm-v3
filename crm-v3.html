<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Вася и продажи</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fa;--white:#fff;--bd:#e5e7eb;--bd2:#d1d5db;--text:#111827;--t2:#6b7280;--t3:#9ca3af;--navy:#0f172a;--navy2:#1e293b;--navy3:#334155;--blue:#3b82f6;--blue2:#2563eb;--green:#10b981;--green2:#059669;--greenBg:#ecfdf5;--greenBd:#a7f3d0;--red:#ef4444;--amber:#f59e0b;--sw:220px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
input,select{font-family:'Inter',sans-serif;background:var(--white);border:1px solid var(--bd);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:border .2s;width:100%}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
textarea{font-family:'Inter',sans-serif;background:var(--white);border:1px solid var(--bd);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;resize:vertical;width:100%;min-height:60px}
textarea:focus{border-color:var(--blue)}
button{font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
/* Toggle */
.toggle{position:relative;width:44px;height:24px;display:inline-block;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;transition:.25s;cursor:pointer}
.toggle .slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.slider{background:var(--blue)}
.toggle input:checked+.slider::before{transform:translateX(20px)}

/* Login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a5f)}
.lb{text-align:center;animation:fu .5s ease}.lb h1{font-size:36px;font-weight:800;color:#fff;margin-bottom:6px}.lb p{color:#94a3b8;margin-bottom:40px;font-size:15px}.lb small{font-size:10px;letter-spacing:5px;color:#64748b;display:block;margin-bottom:14px}
.lbtns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.lbtn{padding:20px 30px;border-radius:14px;font-size:15px;font-weight:600;min-width:150;text-align:center;border:2px solid rgba(255,255,255,.1);color:#fff;background:rgba(255,255,255,.05)}
.lbtn:hover{transform:translateY(-2px);background:rgba(255,255,255,.1);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.lbtn .ic{font-size:28px;margin-bottom:8px}.lbtn .rl{font-size:11px;color:#94a3b8;margin-top:4px}

/* Sidebar */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--navy);display:flex;flex-direction:column;z-index:100}
.s-logo{padding:18px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--navy3)}
.s-logo .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.s-logo .nm{color:#fff;font-size:15px;font-weight:700}
.s-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.sn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:none;background:transparent;color:#94a3b8;font-size:13px;font-weight:500;width:100%;text-align:left}
.sn:hover{background:var(--navy2);color:#e2e8f0}.sn.act{background:var(--blue);color:#fff}
.sn .si{width:20px;text-align:center;font-size:14px}
.s-bot{padding:16px;border-top:1px solid var(--navy3)}
.s-bot .u{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.s-bot .u .a2{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
.s-bot .un{color:#fff;font-size:13px;font-weight:600}.s-bot .ur{color:#64748b;font-size:10px}
.s-out{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:none;background:transparent;color:#64748b;font-size:12px;width:100%;text-align:left}
.s-out:hover{background:var(--navy2);color:#e2e8f0}
.main{margin-left:var(--sw);min-height:100vh;padding:28px 32px;max-width:1300px}

/* Page header */
.ph{margin-bottom:24px}.ph h1{font-size:22px;font-weight:800;margin-bottom:4px}.ph p{font-size:13px;color:var(--t2)}
/* Sub-tabs */
.subtabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--bd);padding-bottom:0}
.stab{padding:10px 18px;border:none;background:transparent;color:var(--t2);font-size:13px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px}
.stab.act{color:var(--text);border-bottom-color:var(--blue);font-weight:600}
.stab:hover:not(.act){color:var(--text)}

/* Card */
.card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:24px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:700;margin-bottom:4px}

/* Grid */
.g{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
.fi{display:flex;flex-direction:column;gap:5px}.fi>label{font-size:12px;color:var(--t2);font-weight:500}
.unit{position:relative}.unit input{padding-right:28px}.unit::after{content:attr(data-u);position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}

/* Stat boxes */
.sbox{padding:16px 20px;background:var(--bg);border-radius:10px;border:1px solid var(--bd)}
.sbox.hl{background:var(--greenBg);border-color:var(--greenBd)}
.sbox .lb2{font-size:12px;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.sbox .vl{font-size:22px;font-weight:800}.sbox .vl.gr{color:var(--green2)}

/* Badges */
.bdg{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block}
.bdg-g{background:#dcfce7;color:#166534}.bdg-gr{background:#f3f4f6;color:#374151}

/* Emp card */
.emp{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:24px;margin-bottom:20px}
.emp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.emp-n{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.emp-badges{display:flex;gap:8px;align-items:center}
.calc-text{font-size:12px;color:var(--t3);line-height:1.8;margin-top:16px}

/* Tariff card */
.tar-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:22px;display:flex;flex-direction:column}
.tar-name{font-size:15px;font-weight:700;margin-bottom:4px}.tar-desc{font-size:12px;color:var(--t2);line-height:1.5;min-height:40px;margin-bottom:18px}
.tar-old{font-size:12px;color:var(--t3);text-decoration:line-through;margin-top:18px}
.tar-price{font-size:22px;font-weight:800;margin-top:2px}
.tar-disc{font-size:12px;color:var(--t2);margin-top:2px;margin-bottom:14px}
.tar-toggle{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--bd)}
.tar-toggle span{font-size:13px;color:var(--t2)}

/* Save button */
.save-btn{padding:10px 24px;border:none;border-radius:10px;font-size:13px;font-weight:600;color:#fff;background:var(--green2);display:flex;align-items:center;gap:6px;float:right}
.save-btn:hover{background:#047857}

/* Kanban */
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:480px}
.kc{min-width:210px;flex:0 0 210px;background:var(--bg);border-radius:12px;border:1px solid var(--bd);display:flex;flex-direction:column}
.kc.dov{border-color:var(--blue);background:#eff6ff}
.kh{padding:12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.kd{width:9px;height:9px;border-radius:50%}.knm{font-size:12px;font-weight:600}
.kcn{margin-left:auto;font-size:11px;font-weight:600;background:var(--white);padding:2px 8px;border-radius:8px;color:var(--t2);border:1px solid var(--bd)}
.kbody{flex:1;padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:420px}
.kcard{background:var(--white);border-radius:10px;padding:12px;cursor:grab;border:1px solid var(--bd);transition:all .15s}
.kcard:hover{border-color:var(--bd2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kcard.dg{opacity:.3}

/* Table */
.tw{background:var(--white);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{text-align:left;padding:12px 16px;color:var(--t2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--bg)}
table.t td{padding:10px 16px;border-bottom:1px solid #f3f4f6}
table.t tr:hover td{background:#f9fafb}
.tbdg{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block}

/* Dashboard */
.dash-wrap{display:flex;flex-direction:column;gap:14px}
.dash-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.ds-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;min-height:112px;display:flex;flex-direction:column;justify-content:flex-start}
.ds-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ds-ic{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.ds-ic.p{background:#e8f7ef;color:#1f9d5a}
.ds-ic.r{background:#e9f0ff;color:#3b82f6}
.ds-ic.l{background:#e8f8ff;color:#0891b2}
.ds-ic.c{background:#fff4db;color:#d97706}
.ds-lb{font-size:13px;color:var(--t2);font-weight:600}
.ds-vl{font-size:37px;font-weight:800;letter-spacing:-.4px;line-height:1.05}
.ds-sub{margin-top:5px;font-size:12px;color:var(--t2)}

.dash-team{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.tm-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:14px 16px}
.tm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tm-name{font-size:31px;font-weight:800;line-height:1.1}
.tm-k{font-size:11px;font-weight:700;color:#15803d;background:#e9f8ee;border:1px solid #b8edca;padding:3px 8px;border-radius:999px}
.tm-metric{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
.tm-label{color:var(--t2)}
.tm-value{font-weight:700;color:#1f2937}
.tm-row{margin-top:10px}
.tm-rowline{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#4b5563;margin-bottom:4px}
.tm-track{height:7px;background:#e7edf4;border-radius:999px;overflow:hidden}
.tm-fill{height:100%;border-radius:999px}
.tm-fill.min{background:#1f9d5a}
.tm-fill.tar{background:#2f6de0}

.dash-charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.chart-card{background:var(--white);border:1px solid var(--bd);border-radius:12px;padding:16px}
.chart-title{font-size:15px;font-weight:700;margin-bottom:10px}
.chart-svg{width:100%;height:auto;display:block}
.dash-legend{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:8px;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:6px;font-size:12px;color:#3f4955}
.lg i{width:10px;height:10px;border-radius:50%;display:inline-block}
.pb{height:6px;background:#e5e7eb;border-radius:4px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width .6s}

/* Workspace */
.ws-pay{background:var(--greenBg);border:1px solid var(--greenBd);border-radius:12px;padding:20px;margin-bottom:20px}
.ws-pg{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;text-align:center}
.ws-pl{font-size:11px;color:var(--t2);margin-bottom:4px}.ws-pv{font-size:20px;font-weight:800}

.lead-item{padding:12px 16px;background:var(--bg);border-radius:10px;border-left:3px solid var(--blue);margin-bottom:8px;transition:background .15s}
.lead-item:hover{background:#eef2ff}
.ss-row{display:flex;gap:10px;flex-wrap:wrap}
.ss-c{padding:10px 18px;background:var(--bg);border-radius:10px;text-align:center;min-width:100;border:1px solid var(--bd)}
.ss-v{font-size:22px;font-weight:800}.ss-l{font-size:10px;color:var(--t2);margin-top:3px}

.btn-p{padding:10px 20px;border:none;border-radius:9px;font-size:13px;font-weight:600;color:#fff;background:var(--blue)}.btn-p:hover{background:var(--blue2)}
.btn-del{padding:5px 12px;font-size:11px;border:1px solid #fecaca;border-radius:6px;background:#fff;color:var(--red)}.btn-del:hover{background:#fef2f2}

@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fu .3s ease both}
@media(max-width:900px){
  :root{--sw:58px}
  .s-logo .nm,.sn span:not(.si),.s-bot .un,.s-bot .ur,.s-out span:last-child{display:none}
  .main{padding:20px 16px}
  .g4,.g6{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  .ws-pg{grid-template-columns:repeat(2,1fr)}
  .dash-summary{grid-template-columns:repeat(2,minmax(0,1fr))}
  .dash-team,.dash-charts{grid-template-columns:1fr}
  .tm-metric{flex-direction:column;align-items:flex-start;gap:4px}
}
@media(max-width:620px){
  .dash-summary{grid-template-columns:1fr}
  .ds-vl{font-size:30px}
  .chart-card,.tm-card,.ds-card{padding:14px}
}
</style>
</head>

// Tiered premium calculation matching screenshot
function calcPrem(e){
  if(!e.planMin||!e.actual) return {tiers:[],premium:0,total:e.salary||0};
  const tiers=[];
  let remaining=e.actual, premium=0;
  // Tier 1: up to planMin at base rate
  const t1=Math.min(remaining,e.planMin);
  const p1=t1*e.basePct/100;
  tiers.push({from:0,to:e.planMin,rate:e.basePct,amount:Math.round(p1),actual:t1});
  premium+=p1; remaining-=t1;
  // Tier 2: planMin to planTarget at base*coeffMin
  if(remaining>0 && e.planTarget>e.planMin){
    const cap=e.planTarget-e.planMin;
    const t2=Math.min(remaining,cap);
    const rate2=e.basePct*e.coeffMin;
    const p2=t2*rate2/100;
    tiers.push({from:e.planMin,to:e.planMin+t2,rate:rate2,amount:Math.round(p2),actual:t2});
    premium+=p2; remaining-=t2;
  }
  // Tier 3: above planTarget at base*coeffTarget
  if(remaining>0){
    const rate3=e.basePct*e.coeffTarget;
    const p3=remaining*rate3/100;
    tiers.push({from:e.planTarget,to:e.planTarget+remaining,rate:rate3,amount:Math.round(p3),actual:remaining});
    premium+=p3;
  }
  return {tiers,premium:Math.round(premium),total:Math.round((e.salary||0)+premium)};
}

function axisCeil(v){return Math.max(200000,Math.ceil(v/200000)*200000)}
function axisK(v){return`${Math.round(v/1000)}k`}
function buildCumSeries(dayRows){
  const cfg=[{key:'a',name:'Алина',color:'#2f6de0',dash:''},{key:'p',name:'Паша',color:'#1f9d5a',dash:''},{key:'v',name:'Вася',color:'#e7a63b',dash:'6 4'}];
  return cfg.map(c=>{
    let run=0;
    const values=dayRows.map(d=>{run+=d[c.key]||0;return run});
    return {...c,values};
  });
}
function chartCum(dayRows,series,maxY){
  const w=620,h=250,m={l:44,r:14,t:14,b:34},pw=w-m.l-m.r,ph=h-m.t-m.b;
  const steps=Math.max(dayRows.length-1,1);
  const x=i=>m.l+(i/steps)*pw;
  const y=v=>m.t+ph-(v/maxY)*ph;
  const yTicks=[0,.25,.5,.75,1].map(t=>Math.round(maxY*t));
  let s='';
  yTicks.forEach(v=>{const yy=y(v);s+=`<line x1="${m.l}" y1="${yy.toFixed(1)}" x2="${(m.l+pw).toFixed(1)}" y2="${yy.toFixed(1)}" stroke="#e8edf3"/><text x="${(m.l-6).toFixed(1)}" y="${(yy+3).toFixed(1)}" fill="#98a3b0" font-size="10" text-anchor="end" font-family="Inter">${axisK(v)}</text>`});
  dayRows.forEach((d,i)=>{if(i===0||i===dayRows.length-1||i%2===1){const xx=x(i);s+=`<text x="${xx.toFixed(1)}" y="${(m.t+ph+16).toFixed(1)}" fill="#98a3b0" font-size="10" text-anchor="middle" font-family="Inter">${d.d}</text>`}});
  const baseY=m.t+ph;
  const area=series.find(c=>c.key==='a');
  if(area&&area.values.length){
    const aPts=area.values.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' L ');
    s+=`<path d="M${x(0).toFixed(1)},${baseY.toFixed(1)} L ${aPts} L ${x(area.values.length-1).toFixed(1)},${baseY.toFixed(1)} Z" fill="rgba(47,109,224,.12)"/>`;
  }
  series.forEach(c=>{
    if(!c.values.length)return;
    const pts=c.values.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${c.color}" stroke-width="2.6" stroke-linecap="round"${c.dash?` stroke-dasharray="${c.dash}"`:''}/>`;
  });
  return`<div class="chart-card"><h3 class="chart-title">Накопительная динамика поступлений</h3><svg class="chart-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Накопительная динамика поступлений">${s}</svg>${legend(series.map(c=>({name:c.name,color:c.color})))}</div>`;
}
function chartDaily(dayRows,maxY){
  const w=620,h=250,m={l:44,r:14,t:14,b:34},pw=w-m.l-m.r,ph=h-m.t-m.b;
  const y=v=>m.t+ph-(v/maxY)*ph;
  const yTicks=[0,.25,.5,.75,1].map(t=>Math.round(maxY*t));
  const barStep=dayRows.length?pw/dayRows.length:pw;
  const barW=barStep*.62;
  let s='';
  yTicks.forEach(v=>{const yy=y(v);s+=`<line x1="${m.l}" y1="${yy.toFixed(1)}" x2="${(m.l+pw).toFixed(1)}" y2="${yy.toFixed(1)}" stroke="#e8edf3"/><text x="${(m.l-6).toFixed(1)}" y="${(yy+3).toFixed(1)}" fill="#98a3b0" font-size="10" text-anchor="end" font-family="Inter">${axisK(v)}</text>`});
  dayRows.forEach((d,i)=>{
    const x0=m.l+i*barStep+(barStep-barW)/2;
    let top=m.t+ph;
    [['a','#2f6de0'],['p','#1f9d5a'],['v','#e7a63b']].forEach(([k,c])=>{
      const val=d[k]||0;
      if(!val)return;
      const bh=(val/maxY)*ph;
      top-=bh;
      s+=`<rect x="${x0.toFixed(1)}" y="${top.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${c}" rx="3"/>`;
    });
    if(i===0||i===dayRows.length-1||i%2===1){
      s+=`<text x="${(x0+barW/2).toFixed(1)}" y="${(m.t+ph+16).toFixed(1)}" fill="#98a3b0" font-size="10" text-anchor="middle" font-family="Inter">${d.d}</text>`;
    }
  });
  return`<div class="chart-card"><h3 class="chart-title">Ежедневные поступления</h3><svg class="chart-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Ежедневные поступления">${s}</svg>${legend([{name:'Алина',color:'#2f6de0'},{name:'Паша',color:'#1f9d5a'},{name:'Вася',color:'#e7a63b'}])}</div>`;
}
function legend(items){return`<div class="dash-legend">${items.map(i=>`<span class="lg"><i style="background:${i.color}"></i>${i.name}</span>`).join('')}</div>`}

// ═══ WORKSPACE ═══
function rWork(el){
  const emp=E(D.user),p=calcPrem(emp);
  const pT=emp.planTarget?emp.actual/emp.planTarget:0,pM=emp.planMin?emp.actual/emp.planMin:0;
  const rem=Math.max(0,emp.planTarget-emp.actual);
  const myL=D.leads.filter(l=>l.mgr===D.user);
  const act=myL.filter(l=>!['Успешно','Отказ клиента','Тотал игнор'].includes(l.st));
  const won=myL.filter(l=>l.st==='Успешно');
  const conv=myL.length?(won.length/myL.length*100).toFixed(1):0;

  let h=`<div class="ph anim"><h1>Рабочий стол — ${emp.name}</h1></div>`;
  // Pay card
  h+=`<div class="ws-pay anim"><div class="ws-pg">`;
  h+=`<div><div class="ws-pl">Оклад</div><div class="ws-pv">${F(emp.salary)} ₽</div></div>`;
  h+=`<div><div class="ws-pl">Премия</div><div class="ws-pv" style="color:var(--green2)">${F(p.premium)} ₽</div></div>`;
  h+=`<div><div class="ws-pl">Факт прибыли</div><div class="ws-pv">${F(emp.actual)} ₽</div></div>`;
  h+=`<div><div class="ws-pl">До цели осталось</div><div class="ws-pv" style="color:${rem>0?'var(--amber)':'var(--green2)'}">${rem>0?F(rem)+' ₽':'Выполнен!'}</div></div>`;
  h+=`<div><div class="ws-pl">К ВЫПЛАТЕ</div><div class="ws-pv" style="color:var(--green2);font-size:24px">${F(p.total)} ₽</div></div>`;
  h+=`</div></div>`;
  // Progress
  h+=`<div class="g g2">`;
  h+=`<div class="card"><h3>Прогресс</h3>`;
  [{l:'Минимум ('+FK(emp.planMin)+')',v:pM,c:pM>=1?'#10b981':'#ef4444'},{l:'Целевой ('+FK(emp.planTarget)+')',v:pT,c:pT>=1?'#10b981':'#f59e0b'}].forEach(x=>{
    h+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--t2)">${x.l}</span><span style="color:${x.c};font-weight:700">${(x.v*100).toFixed(0)}%</span></div><div class="pb" style="height:10px"><div class="pf" style="width:${Math.min(x.v*100,100)}%;background:${x.c}"></div></div></div>`});
  h+=`<div style="padding:14px;background:var(--bg);border-radius:10px;margin-top:8px"><div style="font-size:11px;color:var(--t3);margin-bottom:6px"><strong>Расчёт премии:</strong></div>`;
  p.tiers.forEach(t=>{if(t.actual>0)h+=`<div style="font-size:12px;color:var(--t3)">До ${F(t.to)} ₽: ${t.rate}% → ${F(t.amount)} ₽</div>`});
  h+=`</div></div>`;
  // Active leads
  h+=`<div class="card"><h3>Активные заявки (${act.length})</h3><div style="max-height:300px;overflow-y:auto">`;
  if(!act.length)h+=`<div style="color:var(--t3);padding:16px">Нет активных заявок</div>`;
  act.forEach(l=>{h+=`<div class="lead-item" style="border-left-color:${STC[l.st]}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-weight:600;font-size:13px">${l.nm}</span><span style="font-size:10px;padding:3px 10px;border-radius:8px;background:${STC[l.st]}15;color:${STC[l.st]}">${l.st}</span></div><div style="font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.req}</div></div>`});
  h+=`</div></div></div>`;
  // Stats
  h+=`<div class="card"><h3>Статистика</h3><div class="ss-row">`;
  ST.forEach(s=>{const c=myL.filter(l=>l.st===s).length;h+=`<div class="ss-c"><div class="ss-v" style="color:${STC[s]}">${c}</div><div class="ss-l">${s}</div></div>`});
  h+=`</div></div>`;
  el.innerHTML=h;
}

// ═══ KANBAN ═══
function rKanban(el){
  const leads=isH()?D.leads:D.leads.filter(l=>l.mgr===D.user);
  let h=`<div class="ph anim"><h1>${D.tab==='leads'?'Лиды':'Сделки'}</h1></div><div class="kb anim">`;
  ST.forEach(st=>{
    const items=leads.filter(l=>l.st===st);
    h+=`<div class="kc" ondragover="event.preventDefault();this.classList.add('dov')" ondragleave="this.classList.remove('dov')" ondrop="drp(event,'${st}');this.classList.remove('dov')">`;
    h+=`<div class="kh"><div class="kd" style="background:${STC[st]}"></div><span class="knm">${st}</span><span class="kcn">${items.length}</span></div><div class="kbody">`;
    items.forEach(l=>{
      const e=E(l.mgr);
      h+=`<div class="kcard" draggable="true" ondragstart="D.dragId='${l.id}';this.classList.add('dg')" ondragend="this.classList.remove('dg')">`;
      h+=`<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-weight:600;font-size:12px">${l.nm}</span><span style="font-size:9px;color:var(--t3)">${l.dt}</span></div>`;
      h+=`<div style="font-size:11px;color:var(--t2);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${l.req}</div>`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;background:${e?.color||'#666'}15;color:${e?.color||'#666'}">${e?.name||''}</span>`;
      if(l.sum)h+=`<span style="font-size:10px;color:var(--green2);font-weight:700">${F(l.sum)} ₽</span>`;
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function drp(e,st){e.preventDefault();if(!D.dragId)return;const l=D.leads.find(x=>x.id===D.dragId);if(l){l.st=st;renderMain()}D.dragId=null}

// ═══ PAYMENTS ═══
function rPay(el){
  const mn=E(D.user)?.name;
  const pays=isH()?D.payments:D.payments.filter(p=>p.mgr===mn);
  let h=`<div class="ph anim"><h1>Оплаты</h1></div><div class="tw anim"><table class="t"><thead><tr>`;
  ['Дата','Клиент','Тариф','Выручка','Чистыми','Оплата','Менеджер'].forEach(x=>h+=`<th>${x}</th>`);
  h+=`</tr></thead><tbody>`;
  pays.forEach(p=>{
    const tc=p.tar.includes('VIP')?'background:#f3e8ff;color:#7c3aed':p.tar.includes('куратор')||p.tar.includes('Василием')?'background:#e0f2fe;color:#0284c7':'background:#fef3c7;color:#b45309';
    h+=`<tr><td style="color:var(--t2)">${p.dt}</td><td style="font-weight:600">${p.nm}</td><td><span class="tbdg" style="${tc}">${p.tar}</span></td><td style="font-weight:700">${F(p.rev)} ₽</td><td style="color:var(--green2)">${F(p.net)} ₽</td><td style="color:${p.met==='сразу'?'var(--green2)':'var(--amber)'}">${p.met}</td><td style="color:var(--t2)">${p.mgr}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

// ═══ INIT ═══
initLogin();
</script>
